<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel wejść — WYDRA ASG</title>
<style>
  :root {
    --bg: #0a0a08;
    --panel: #15150f;
    --panel-hover: #1c1c14;
    --border: #3d4020;
    --border-light: #7a8536;
    --text: #f3efe2;
    --text-dim: #c9c6ad;
    --text-faint: #6b6a5a;
    --blaze: #e6540f;
    --moss: #7a8536;
    --mono: 'Consolas', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 60px 24px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: var(--text-faint);
    font-size: 13px;
    margin-bottom: 36px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .label {
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .meta { text-align: right; }
  .value { font-size: 48px; font-weight: 700; color: var(--blaze); }
  .value.loading { font-size: 16px; font-weight: 400; color: var(--text-faint); }
  .prev { font-size: 12px; color: var(--text-faint); margin-top: 6px; }
  .prev .delta-up { color: var(--moss); }
  .prev .delta-zero { color: var(--text-faint); }
  button {
    background: transparent;
    border: 1px solid var(--blaze);
    color: var(--blaze);
    padding: 9px 18px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: rgba(230,84,15,0.1); }
  button:disabled { opacity: .4; cursor: default; }
  .status { color: var(--text-faint); font-size: 12px; margin-top: 14px; }

  .history { margin-top: 36px; }
  .history h2 {
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .history-empty { font-size: 12px; color: var(--text-faint); padding: 16px 0; }
  .hist-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 18px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .hist-date { font-size: 12px; color: var(--text-dim); }
  .hist-value { font-size: 16px; font-weight: 700; color: var(--blaze); }
  .hist-value .delta-up { font-size: 11px; color: var(--moss); font-weight: 400; margin-left: 6px; }
  .hist-value .delta-zero { font-size: 11px; color: var(--text-faint); font-weight: 400; margin-left: 6px; }
  .hist-clear {
    background: transparent;
    border: 1px solid var(--text-faint);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 14px;
  }
  .hist-clear:hover { border-color: var(--text-dim); color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Panel wejść — WYDRA ASG</h1>
  <div class="sub">Odczyt licznika NIE zwiększa liczby wejść.</div>

  <div class="card">
    <span class="label">Wejścia na stronę</span>
    <span class="meta">
      <div class="value loading" id="value">…</div>
      <div class="prev" id="prev"></div>
    </span>
  </div>

  <button id="refresh">Odśwież</button>
  <div class="status" id="status"></div>

  <div class="history">
    <h2>Historia odczytów</h2>
    <div id="historyList"></div>
    <button class="hist-clear" id="clearHistory">Wyczyść historię</button>
  </div>
</div>

<script>
  const COUNTER_KEY = "sw78_wydra_visits_9f3k2";
  const SNAPSHOT_KEY = "sw78_wydra_panel_snapshot"; // stary klucz, do migracji
  const HISTORY_KEY = "sw78_wydra_panel_history";    // NOWY: pełna historia odczytów
  const MAX_HISTORY = 200;

  const valueEl = document.getElementById("value");
  const prevEl = document.getElementById("prev");
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("refresh");
  const historyListEl = document.getElementById("historyList");
  const clearHistoryBtn = document.getElementById("clearHistory");

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    // Migracja ze starego, pojedynczego zapisu (jeśli istnieje)
    try {
      const oldRaw = localStorage.getItem(SNAPSHOT_KEY);
      if (oldRaw) {
        const old = JSON.parse(oldRaw);
        return [{ when: old.when || "wcześniej", value: old.value }];
      }
    } catch (e) {}
    return [];
  }

  function saveHistory(history) {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
    } catch (e) {}
  }

  function deltaHtml(current, previous) {
    const diff = current - previous;
    if (diff > 0) return `<span class="delta-up">+${diff}</span>`;
    if (diff < 0) return `<span class="delta-zero">${diff}</span>`;
    return `<span class="delta-zero">bez zmian</span>`;
  }

  function renderHistory(history) {
    if (!history.length) {
      historyListEl.innerHTML = `<div class="history-empty">Brak wcześniejszych odczytów — pojawią się tu od kolejnego otwarcia panelu.</div>`;
      clearHistoryBtn.style.display = "none";
      return;
    }
    clearHistoryBtn.style.display = "inline-block";
    historyListEl.innerHTML = history.map((entry, i) => {
      const prevEntry = history[i + 1];
      const deltaPart = prevEntry ? deltaHtml(entry.value, prevEntry.value) : "";
      return `
        <div class="hist-row">
          <span class="hist-date">${entry.when || "—"}</span>
          <span class="hist-value">${entry.value}${deltaPart}</span>
        </div>`;
    }).join("");
  }

  clearHistoryBtn.addEventListener("click", () => {
    if (!confirm("Usunąć całą zapisaną historię odczytów z tej przeglądarki?")) return;
    localStorage.removeItem(HISTORY_KEY);
    localStorage.removeItem(SNAPSHOT_KEY);
    renderHistory([]);
  });

  function load() {
    btn.disabled = true;
    valueEl.classList.add("loading");
    valueEl.textContent = "…";
    statusEl.textContent = "Wczytywanie…";

    const history = loadHistory();
    const prevEntry = history[0] || null;

    fetch("https://countapi.mileshilliard.com/api/v1/get/" + COUNTER_KEY)
      .then(r => r.json())
      .then(data => {
        const val = data.value != null ? Number(data.value) : 0;
        valueEl.classList.remove("loading");
        valueEl.textContent = val;

        if (prevEntry && typeof prevEntry.value === "number") {
          prevEl.innerHTML = `poprzednio: ${prevEntry.value} (${deltaHtml(val, prevEntry.value)}) — ${prevEntry.when || ""}`;
        } else {
          prevEl.textContent = "brak danych z poprzedniej wizyty";
        }

        const nowText = new Date().toLocaleString("pl-PL");
        statusEl.textContent = "Ostatnie odświeżenie: " + nowText;

        const newEntry = { when: nowText, value: val };
        const updatedHistory = [newEntry, ...history];
        saveHistory(updatedHistory);
        renderHistory(updatedHistory);
      })
      .catch(() => {
        valueEl.classList.remove("loading");
        valueEl.textContent = "błąd";
        statusEl.textContent = "Błąd odczytu — sprawdź połączenie.";
      })
      .finally(() => { btn.disabled = false; });
  }

  btn.addEventListener("click", load);
  load();
</script>
</body>
</html>
